// ========== MainApp ==========
function MainApp({ profile, onLogout, lang, onLangChange }) {
  const [state, dispatch] = useReducer(reducer, null, () => loadState(profile.id));
  const [syncStatus, setSyncStatus] = useState('idle'); // idle | loading | saving | synced | error
  const [syncError, setSyncError] = useState('');
  const firstLoadRef = useRef(true);
  const saveTimerRef = useRef(null);

  // 寫入 localStorage（無論如何都存本地作為快取）
  useEffect(() => { saveState(profile.id, state); }, [state]);

  // 從雲端拉資料覆蓋本地（首次載入 / 加入新共享後重抓）
  const reloadFromCloud = async (silent) => {
    if (!USE_BACKEND) { firstLoadRef.current = false; return; }
    if (!silent) setSyncStatus('loading');
    try {
      const r = await apiFetch('/api/data');
      const d = await r.json();
      if (d.data && d.data.patients) {
        firstLoadRef.current = true;
        dispatch({ type: 'SET_STATE', payload: d.data });
      }
      setSyncStatus('synced');
    } catch (e) {
      setSyncStatus('error');
      setSyncError(e.message || String(e));
    } finally {
      setTimeout(() => { firstLoadRef.current = false; }, 500);
    }
  };
  useEffect(() => { reloadFromCloud(); }, []);

  // 有變動時：debounce 3 秒後推到雲端
  useEffect(() => {
    if (!USE_BACKEND) return;
    if (firstLoadRef.current) return; // 剛載入那次不要立刻存
    if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
    setSyncStatus('saving');
    saveTimerRef.current = setTimeout(async () => {
      try {
        const res = await apiFetch('/api/data', { method: 'PUT', body: JSON.stringify({ data: state }) });
        if (!res.ok) throw new Error(await readError(res));
        setSyncStatus('synced');
      } catch (e) {
        setSyncStatus('error');
        setSyncError((e.message || String(e)).slice(0, 200));
      }
    }, 3000);
    return () => { if (saveTimerRef.current) clearTimeout(saveTimerRef.current); };
  }, [state]);

  useEffect(() => { if (state.settings.lang && state.settings.lang !== lang) onLangChange(state.settings.lang); }, []);
  const [tab, setTab] = useState('dashboard');
  const [showPatientEditor, setShowPatientEditor] = useState(false);
  const [showRedeemFromEmpty, setShowRedeemFromEmpty] = useState(false);
  const [showAbout, setShowAbout] = useState(false);
  const [showMenu, setShowMenu] = useState(false);
  const hasPatient = !!state.currentPatientId;
  const tabs = [['dashboard', t('dashboard', lang)], ['vitals', t('vitals', lang)], ['meds', t('meds', lang)], ['consult', t('consult', lang)], ['care', t('care', lang)], ['er', t('erCard', lang)]];
  return (
    <AppCtx.Provider value={{ state, dispatch }}>
      <div className="min-h-screen pb-24">
        <header className="bg-white/80 backdrop-blur-md border-b border-slate-200/70 sticky top-0 z-30 print:hidden">
          <div className="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between gap-3">
            <button onClick={() => setShowAbout(true)} className="flex items-center gap-2 min-w-0 hover:opacity-80" title="查看介紹頁">
              <div className="w-9 h-9 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-sm shrink-0 shadow-sm">醫</div>
              <div className="min-w-0 text-left">
                <div className="font-bold text-sm truncate">{t('appName', lang)}</div>
              </div>
            </button>
            <div className="flex items-center gap-2">
              <SyncIndicator status={syncStatus} error={syncError} />
              <LangSwitcher value={lang} onChange={(v) => { onLangChange(v); dispatch({ type: 'UPDATE_SETTINGS', payload: { lang: v } }); }} compact />
              <PatientSwitcher lang={lang} profile={profile} onReload={reloadFromCloud} />
              <div className="relative">
                <button onClick={() => setShowMenu(!showMenu)} className="flex items-center justify-center w-9 h-9 rounded-full bg-cyan-100 hover:bg-cyan-200 overflow-hidden" title={profile.name}>
                  {profile.pic ? <img src={profile.pic} alt="" className="w-full h-full object-cover" /> : <span className="text-cyan-700 font-semibold text-sm">{profile.name?.[0] || '?'}</span>}
                </button>
                {showMenu && (
                  <>
                    <div className="fixed inset-0 z-40" onClick={() => setShowMenu(false)} />
                    <div className="absolute right-0 top-full mt-1 bg-white border border-slate-200 rounded-lg shadow-lg z-50 min-w-[180px] py-1">
                      <div className="px-3 py-2 border-b border-slate-100">
                        <div className="font-medium text-sm truncate">{profile.name}</div>
                        <div className="text-xs text-slate-500 truncate">{profile.type === 'line' ? 'LINE 帳號' : profile.email || profile.type}</div>
                      </div>
                      <button onClick={() => { setShowAbout(true); setShowMenu(false); }} className="w-full text-left px-3 py-2 text-sm text-slate-700 hover:bg-slate-50">查看介紹頁</button>
                      <button onClick={() => { setShowMenu(false); onLogout(); }} className="w-full text-left px-3 py-2 text-sm text-red-600 hover:bg-red-50 border-t border-slate-100">{typeof DEMO_MODE !== 'undefined' && DEMO_MODE ? '重新開始體驗' : '登出'}</button>
                    </div>
                  </>
                )}
              </div>
            </div>
          </div>
        </header>
        {showAbout && <AboutOverlay lang={lang} onClose={() => setShowAbout(false)} />}
        <main className="max-w-3xl mx-auto px-4 pt-4">
          {!hasPatient ? (
            <div className="py-12 text-center">
              <div className="bg-white/80 backdrop-blur rounded-2xl p-8 border border-slate-200 max-w-md mx-auto">
                <h2 className="text-xl font-bold text-slate-900 mb-2">歡迎，{profile.name}</h2>
                <p className="text-sm text-slate-600 mb-6">開始建立你要照顧的對象，即可記錄數值、用藥、看診等資訊。</p>
                <div className="space-y-2">
                  <Btn onClick={() => setShowPatientEditor(true)} className="w-full">＋ 新增被照顧者</Btn>
                  <button onClick={() => setShowRedeemFromEmpty(true)} className="w-full text-sm text-cyan-600 hover:text-cyan-800 underline">{t('redeemCode', lang)}</button>
                </div>
              </div>
            </div>
          ) : (
            <>
              {tab === 'dashboard' && <Dashboard lang={lang} />}
              {tab === 'vitals' && <Vitals lang={lang} />}
              {tab === 'meds' && <Medications lang={lang} />}
              {tab === 'consult' && <Consultations lang={lang} />}
              {tab === 'care' && <CareLogs lang={lang} />}
              {tab === 'er' && <ERCard lang={lang} />}
            </>
          )}
        </main>
        {hasPatient && (
          <nav className="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-slate-200/70 print:hidden z-30">
            <div className="max-w-3xl mx-auto flex">
              {tabs.map(([id, label]) => (
                <button key={id} onClick={() => setTab(id)} className={'flex-1 py-3.5 text-center border-t-2 text-sm whitespace-nowrap transition ' + (tab === id ? 'tab-active font-semibold' : 'border-transparent text-slate-500 hover:text-slate-700')}>{label}</button>
              ))}
            </div>
          </nav>
        )}
        {showPatientEditor && <PatientEditor patient={{}} onClose={() => setShowPatientEditor(false)} lang={lang} />}
        {showRedeemFromEmpty && <RedeemCodeModal profile={profile} lang={lang} onClose={() => setShowRedeemFromEmpty(false)} onJoined={() => reloadFromCloud()} />}
      </div>
    </AppCtx.Provider>
  );
}

function PatientSwitcher({ lang, profile, onReload }) {
  const { state, dispatch } = useContext(AppCtx);
  const [open, setOpen] = useState(false);
  const [editing, setEditing] = useState(null);
  const [showRedeem, setShowRedeem] = useState(false);
  const current = state.patients.find(p => p.id === state.currentPatientId);
  if (!current) return null;
  const isCurrentShared = !!current._sharedFrom;
  return (
    <>
      <button onClick={() => setOpen(true)} className="flex items-center gap-2 bg-slate-100 rounded-lg px-3 py-1.5 hover:bg-slate-200">
        <div className={'w-7 h-7 rounded-full text-white flex items-center justify-center font-semibold text-sm ' + (isCurrentShared ? 'bg-purple-500' : 'bg-cyan-500')}>{current.name[0]}</div>
        <div className="text-sm font-medium">{current.name}</div>
        <span className="text-slate-400 text-xs">▼</span>
      </button>
      <Modal open={open} onClose={() => setOpen(false)} title={t('addPatient', lang)}>
        <div className="space-y-2 mb-4">
          {state.patients.map(p => {
            const shared = !!p._sharedFrom;
            const sharedCount = (p._sharedWith || []).length;
            return (
              <div key={p.id} className={'flex items-center gap-2 p-3 rounded-lg border ' + (p.id === state.currentPatientId ? (shared ? 'border-purple-400 bg-purple-50' : 'border-cyan-500 bg-cyan-50') : 'border-slate-200')}>
                <button onClick={() => { dispatch({ type: 'SET_CURRENT_PATIENT', payload: p.id }); setOpen(false); }} className="flex items-center gap-3 flex-1 text-left">
                  <div className={'w-10 h-10 rounded-full flex items-center justify-center font-semibold ' + (shared ? 'bg-purple-100 text-purple-700' : 'bg-cyan-100 text-cyan-700')}>{p.name[0]}</div>
                  <div className="min-w-0">
                    <div className="font-medium flex items-center gap-2">
                      <span className="truncate">{p.name}</span>
                      {shared && <span className="text-[10px] px-1.5 py-0.5 bg-purple-100 text-purple-700 rounded shrink-0">{t('sharedFromLabel', lang).replace('{name}', p._ownerName || '')}</span>}
                      {!shared && sharedCount > 0 && <span className="text-[10px] px-1.5 py-0.5 bg-cyan-100 text-cyan-700 rounded shrink-0">{t('sharedWithCount', lang).replace('{n}', String(sharedCount + 1))}</span>}
                    </div>
                    <div className="text-xs text-slate-500 truncate">{p.conditions?.slice(0,30)}</div>
                  </div>
                </button>
                <button onClick={() => { setEditing(p); setOpen(false); }} className="text-slate-500 text-sm px-2">{t('edit', lang)}</button>
              </div>
            );
          })}
        </div>
        <div className="grid grid-cols-2 gap-2">
          <Btn onClick={() => { setEditing({}); setOpen(false); }}>{t('addPatient', lang)}</Btn>
          <Btn variant="secondary" onClick={() => { setShowRedeem(true); setOpen(false); }}>{t('redeemCode', lang)}</Btn>
        </div>
      </Modal>
      {editing && <PatientEditor patient={editing} onClose={() => setEditing(null)} lang={lang} />}
      {showRedeem && <RedeemCodeModal profile={profile} lang={lang} onClose={() => setShowRedeem(false)} onJoined={() => onReload && onReload()} />}
    </>
  );
}

// ========== Root ==========
function DebugPage({ onClose }) {
  const [result, setResult] = useState('載入中...');
  useEffect(() => {
    (async () => {
      const tok = getToken();
      const lines = [];
      lines.push('=== 前端狀態 ===');
      lines.push('BACKEND_URL: ' + (BACKEND_URL || '(空)'));
      lines.push('USE_BACKEND: ' + USE_BACKEND);
      lines.push('Token 存在: ' + (tok ? '是' : '否'));
      lines.push('Token 長度: ' + tok.length);
      lines.push('Token 前 30 字: ' + tok.slice(0, 30));
      lines.push('Token 段數: ' + (tok ? tok.split('.').length : 0));
      lines.push('');
      lines.push('=== Worker /health ===');
      try {
        const r = await fetch(BACKEND_URL + '/health');
        lines.push('Status: ' + r.status);
        lines.push('Body: ' + await r.text());
      } catch (e) { lines.push('ERROR: ' + e.message); }
      lines.push('');
      lines.push('=== Worker /api/debug (帶 token) ===');
      try {
        const r = await fetch(BACKEND_URL + '/api/debug?t=' + encodeURIComponent(tok), { headers: tok ? { 'Authorization': 'Bearer ' + tok } : {} });
        lines.push('Status: ' + r.status);
        lines.push('Body: ' + JSON.stringify(await r.json(), null, 2));
      } catch (e) { lines.push('ERROR: ' + e.message); }
      lines.push('');
      lines.push('=== Worker /api/auth/me ===');
      try {
        const r = await fetch(BACKEND_URL + '/api/auth/me', { headers: tok ? { 'Authorization': 'Bearer ' + tok } : {} });
        lines.push('Status: ' + r.status);
        lines.push('Body: ' + await r.text());
      } catch (e) { lines.push('ERROR: ' + e.message); }
      lines.push('');
      lines.push('=== Worker /api/ai/chat (測試 POST) ===');
      try {
        const r = await fetch(BACKEND_URL + '/api/ai/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...(tok ? { 'Authorization': 'Bearer ' + tok } : {}) },
          body: JSON.stringify({ system: '只回覆「OK」', user: '測試' })
        });
        lines.push('Status: ' + r.status);
        lines.push('Body: ' + await r.text());
      } catch (e) { lines.push('ERROR: ' + e.message); }
      setResult(lines.join('\n'));
    })();
  }, []);
  const copy = () => { navigator.clipboard.writeText(result).then(() => alert('已複製到剪貼簿')); };
  return (
    <div className="fixed inset-0 z-50 bg-white overflow-y-auto">
      <div className="sticky top-0 bg-white border-b border-slate-200 px-4 py-3 flex justify-between items-center">
        <div className="font-bold">診斷資訊</div>
        <div className="flex gap-2">
          <button onClick={copy} className="px-3 py-1.5 bg-cyan-600 text-white rounded text-sm">複製全部</button>
          <button onClick={onClose} className="px-3 py-1.5 bg-slate-200 rounded text-sm">關閉</button>
        </div>
      </div>
      <pre className="p-4 text-xs font-mono whitespace-pre-wrap">{result}</pre>
    </div>
  );
}

function Root() {
  const [profile, setProfile] = useState(null);
  const [lang, setLang] = useState('zh');
  const [checkingSession, setCheckingSession] = useState(USE_BACKEND);
  const [showDebug, setShowDebug] = useState(location.hash === '#debug');
  useEffect(() => {
    const onHash = () => setShowDebug(location.hash === '#debug');
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  useEffect(() => {
    // 有後端：只信後端的說法
    if (USE_BACKEND) {
      const tok = getToken();
      if (!tok) {
        // 沒 token 直接顯示 Landing，不讀本地 profile（避免「假登入」狀態）
        setCurrentProfileId(null);
        setCheckingSession(false);
        return;
      }
      apiFetch('/api/auth/me')
        .then(r => r.json())
        .then(d => {
          if (d.user) {
            const p = { id: d.user.id, name: d.user.name, pic: d.user.pic, type: d.user.provider || 'line' };
            const list = loadProfileIndex();
            if (!list.find(x => x.id === p.id)) { list.push(p); saveProfileIndex(list); }
            setCurrentProfileId(p.id);
            setProfile(p);
            const st = loadState(p.id);
            if (st.settings?.lang) setLang(st.settings.lang);
          } else {
            // token 無效（已過期或 JWT_SECRET 改過）→ 清乾淨，回到 Landing 重新登入
            setToken('');
            setCurrentProfileId(null);
          }
        })
        .catch(() => { setToken(''); setCurrentProfileId(null); })
        .finally(() => setCheckingSession(false));
      return;
    }
    // 無後端：只讀本地
    const pid = getCurrentProfileId();
    if (pid) {
      const list = loadProfileIndex();
      const found = list.find(p => p.id === pid);
      if (found) {
        setProfile(found);
        const st = loadState(found.id);
        if (st.settings?.lang) setLang(st.settings.lang);
      }
    }
  }, []);

  const handleLogin = (p) => {
    const list = loadProfileIndex();
    if (!list.find(x => x.id === p.id)) list.push(p);
    saveProfileIndex(list);
    setCurrentProfileId(p.id);
    setProfile(p);
  };
  const handleLogout = async () => {
    // DEMO：登出 = 清空展場資料、重新體驗
    if (typeof DEMO_MODE !== 'undefined' && DEMO_MODE) {
      if (!confirm('清空所有展場資料並重新開始體驗？')) return;
      try { localStorage.clear(); } catch(e){}
      location.reload();
      return;
    }
    if (!confirm('Logout?')) return;
    if (USE_BACKEND) {
      try { await apiFetch('/api/auth/logout', { method: 'POST' }); } catch(e){}
      setToken('');
    }
    setCurrentProfileId(null);
    setProfile(null);
  };

  if (showDebug) return <DebugPage onClose={() => { location.hash = ''; setShowDebug(false); }} />;
  if (checkingSession) return <div className="min-h-screen flex items-center justify-center text-slate-500 text-sm">載入中…</div>;

  if (!profile) return <Landing onLogin={handleLogin} lang={lang} setLang={setLang} />;

  return <MainApp profile={profile} onLogout={handleLogout} lang={lang} onLangChange={setLang} />;
}

// DEMO：在掛載 React 前注入展場預設資料（safeLS / dataKeyFor 此時已宣告）
if (typeof DEMO_MODE !== 'undefined' && DEMO_MODE) seedDemoStorage();
ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
